<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My OS</title>
    <link rel="stylesheet" type="text/css" href="styles.css">
</head>
<body>
    <div class="topbar">
        <div class="brand">CookieOs</div>
        <div class="status">Never Stop Eating Cookies :D</div>
        <div id="timeElement" class="time">Time</div>
    </div>

    <main class="hero">
        <h1>Welcome to my CookieOs!</h1>
        <p>This is my own webOS that I am developing. It is still in early stages, but I am excited to share it with you all!</p>
        <a href="https://github.com/andrewchu1357/hackclub" target="_blank" rel="noreferrer">My GitHub project</a>
    </main>

    <div id="desktopApps" class="desktop-apps">
        <div class="desktop-app">
            <img src="cookie.jpg" alt="Cookie App" class="desktop-icon">
            <p>Notes</p>
        </div>
    </div>

    <div class="window" id="welcome" style="top: calc(50% - 120px); left: calc(50% - 180px);">
        <div class="windowheader" id="welcomeheader">
            <span>Welcome Window</span>
            <button class="closebutton" id="welcomeclose" type="button">×</button>
        </div>
        <div class="windowcontent">
            <p>Drag this window by its title bar.</p>
        </div>
    </div>

    <button id="welcomeopen" class="openbutton" type="button">Open Welcome Window</button>

    <script src="script.js"></script>
</body>
</html>
